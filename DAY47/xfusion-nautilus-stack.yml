AWSTemplateFormatVersion: '2010-09-09'
Description: A sample CloudFormation template to create an S3 bucket.
Resources:
  #SQS priorites queues (High and low)
  HighPriorityQueue:
   Type: AWS::SQS::Queue
   Properties:
      QueueName: xfusion-High-Priority-Queue
      VisibilityTimeout: 60
  
  LowPriorityQueue:
    Type: AWS::SQS::Queue
    Properties:
        QueueName: xfusion-Low-Priority-Queue
        VisibilityTimeout: 60

  # SNS Topic
  PriorityQueueTopic:
    Type: AWS::SNS::Topic
    Properties: 
      TopicName: xfusion-Priority-Queues-Topic
  
  HighPrioritySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref PriorityQueueTopic
      Protocol: sqs
      Endpoint: !GetAtt HighPriorityQueue.Arn
      FilterPolicy:
        priority:
          - high
  
  LowPrioritySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref PriorityQueueTopic
      Protocol: sqs
      Endpoint: !GetAtt LowPriorityQueue.Arn
      FilterPolicy:
        priority:
          - low
  
  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref HighPriorityQueue
        - !Ref LowPriorityQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: 
              Service: sns.amazonaws.com
            Action: "sqs:SendMessage"
            Resource: 
              - !GetAtt HighPriorityQueue.Arn
              - !GetAtt LowPriorityQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref PriorityQueueTopic
  
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: lambda_execution_role
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess
        - arn:aws:iam::aws:policy/AmazonSNSFullAccess
  
  PriorityLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: xfusion-priorities-queue-function
      Runtime: python3.9
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 5
      Environment:
        Variables:
          high_priority_queue: !Ref HighPriorityQueue
          low_priority_queue:  !Ref LowPriorityQueue
      Code:
          S3Bucket: kklabuser-910854
          S3Key: function-code.zip



  